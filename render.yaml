# Backend: API заявок + Telegram-бот (без статики сайта).
# Сайт деплоится отдельно на Amvera (amvera.yml).

services:
  - type: web
    name: nv-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: WEBAPP_URL
        fromService:
          type: web
          name: nv-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATA_DIR
        value: /data
      - key: PUBLIC_SITE_URL
        value: https://novye-tehnologii.ru
      - key: CORS_ORIGINS
        value: https://novye-tehnologii.ru
      - key: AI_WEB_SEARCH
        value: "false"
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
