# Статический сайт (Solid.js + Vite) — только фронтенд.
# Amvera запускает npm install && npm run build в корне репозитория.
# Сборка делегируется в web/ через корневой package.json.
#
# В панели Amvera задайте переменную окружения:
#   VITE_API_BASE=https://ваш-бэкенд.onrender.com

meta:
  environment: node
  toolchain:
    name: browser
    version: "20"

build:
  artifacts:
    "web/dist/*": /
