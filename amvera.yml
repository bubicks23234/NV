# Статический сайт (Solid.js + Vite) — только фронтенд.
# Бэкенд и Telegram-бот деплоятся отдельно на Render (см. DEPLOY.md).
#
# В панели Amvera задайте переменную окружения для сборки:
#   VITE_API_BASE=https://ваш-бэкенд.onrender.com

meta:
  environment: node
  toolchain:
    name: browser
    version: "20"

build:
  additionalCommands: sh -c "cd web && npm install && npm run build"
  artifacts:
    "web/dist/*": /
